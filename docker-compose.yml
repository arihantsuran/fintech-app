services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    restart: always
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_password
    ports:
      - "5433:5432"
    volumes:
      - fintech_postgres_data:/var/lib/postgresql/data

volumes:
  fintech_postgres_data: